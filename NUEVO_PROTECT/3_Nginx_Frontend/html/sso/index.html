<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal SSO | Sentinel Ecosystem</title>
    <meta name="description" content="Acceso unificado a las herramientas del ecosistema Sentinel.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Estado 1: Login -->
        <div id="login-section" class="login-container fade-in">
            <div class="logo-area">
                <h1>SENTINEL</h1>
                <p>Single Sign-On Portal</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Tu identificador" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                
                <button type="submit" id="submit-btn" class="login-btn">
                    <span id="btn-text">Iniciar Sesión</span>
                    <div id="btn-loader" class="loader"></div>
                </button>
                
                <p id="error-msg" class="error-message">Credenciales inválidas. Inténtalo de nuevo.</p>
            </form>
        </div>

        <!-- Estado 2: Dashboard -->
        <div id="dashboard" class="dashboard-container" style="display: none;">
            <header class="dashboard-header">
                <div>
                    <h1>Panel de Control</h1>
                    <p id="user-welcome" style="color: var(--text-secondary); font-size: 0.875rem;">Bienvenido al portal centralizado</p>
                </div>
                                <div style="display: flex; gap: 1rem; align-items: center;">
                    <a href="/sso/admin.html" id="admin-panel-btn" class="logout-btn" style="display: none; background: var(--accent-gradient); border: none; text-decoration: none; padding: 0.75rem 1.5rem;">Panel de Administración</a>
                    <button id="logout-btn" class="logout-btn">Cerrar Sesión</button>
                </div>
            </header>
            
            <div id="app-grid" class="apps-grid">
                <!-- Se renderizará dinámicamente -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
