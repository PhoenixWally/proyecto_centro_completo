<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración | Sentinel Ecosystem</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            width: 100%;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: none;
            /* Se muestra tras auth */
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
        }

        @media (min-width: 1024px) {
            .admin-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .admin-section {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .section-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .section-title-bar h3 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-color);
        }

        /* Table Styles */
        .table-responsive {
            overflow-x: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9375rem;
        }

        th {
            text-align: left;
            padding: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-card {
            background: #0a0a0a;
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-title {
            margin-bottom: 2rem;
            font-size: 1.75rem;
            font-weight: 700;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
        }

        .btn-cancel {
            flex: 1;
            padding: 0.875rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .btn-save {
            flex: 2;
            padding: 0.875rem;
            border-radius: 12px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .action-btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add {
            background: var(--accent-gradient);
            color: white;
            border: none;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-color);
            border: 1px solid rgba(59, 130, 246, 0.2);
            margin-right: 0.5rem;
        }

        .btn-edit:hover {
            background: var(--accent-color);
            color: white;
        }

        /* Power level badge */
        .level-badge {
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-color);
            font-weight: 600;
            font-size: 0.75rem;
        }
    </style>
</head>

<body>
    <div id="admin-app" class="admin-container">
        <header class="admin-header">
            <div>
                <h1 style="font-size: 2rem; font-weight: 800;">Panel Admin</h1>
                <p style="color: var(--text-secondary); font-size: 0.875rem;">Gestión de infraestructura y accesos</p>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <a href="/procesos/winremote-manager.html" class="logout-btn" style="background: var(--accent-gradient); color: white; border: none; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; font-weight: 600; padding: 0.5rem 1.25rem; border-radius: 8px; font-size: 0.875rem; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);">
                    🖥️ WinRM Manager
                </a>
                <button id="back-btn" class="logout-btn">← Volver al Portal</button>
            </div>
        </header>

        <div class="admin-grid">
            <!-- Gestión de Usuarios -->
            <section class="admin-section fade-in">
                <div class="section-title-bar">
                    <h3>Gestión de Usuarios</h3>
                    <button id="new-user-btn" class="action-btn btn-add">+ Añadir Usuario</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Usuario</th>
                                <th>Nivel</th>
                                <th>Provincia</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="users-body">
                            <!-- JS Rendered -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Gestión de Estaciones -->
            <section id="estaciones-section" class="admin-section fade-in" style="animation-delay: 0.1s;">
                <div class="section-title-bar">
                    <h3>Gestión de Estaciones</h3>
                    <button id="new-station-btn" class="action-btn btn-add">+ Nueva Estación</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Estación</th>
                                <th>IP/Host</th>
                                <th>Provincia</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="stations-body">
                            <!-- JS Rendered -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <!-- Modales -->
    <div id="user-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 class="modal-title">Nuevo Usuario</h2>
            <form id="user-form">
                <input type="hidden" id="user-id" name="id">
                <div class="form-group">
                    <label for="username">Identificador</label>
                    <input type="text" id="username" name="username" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="puesto">Puesto / Cargo (Opcional)</label>
                    <input type="text" id="puesto" name="puesto" placeholder="Ej: Jefes, Jefatura, Técnico...">
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico (Opcional)</label>
                    <input type="email" id="email" name="email" placeholder="usuario@digital.gob.es">
                </div>
                <div class="form-group" id="password-group">
                    <label for="password">Contraseña Inicial</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="nivel_poder">Nivel de Poder (Rol)</label>
                    <select id="nivel_poder" name="nivel_poder" required>
                        <option value="">Selecciona un nivel</option>
                    </select>
                    <p style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.5rem;">Solo se muestran niveles inferiores al tuyo.</p>
                </div>
                <div class="form-group" id="provincia-group">
                    <label for="provincia">Provincia</label>
                    <select id="provincia" name="provincia">
                        <option value="">Global</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <label style="font-weight: 600; color: var(--accent-color); margin-bottom: 0.8rem; display: block;">Acceso a Aplicaciones</label>
                    <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                        <label id="app-procesos-container" style="display: flex; align-items: center; gap: 0.6rem; font-size: 0.875rem; color: var(--text-secondary); cursor: pointer; user-select: none;">
                            <input type="checkbox" id="app_procesos" name="app_procesos" style="width: 16px; height: 16px; accent-color: var(--accent-color); cursor: pointer;">
                            Gestión de Procesos (WinRM)
                        </label>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <label style="font-weight: 600; color: var(--accent-color); margin-bottom: 0.8rem; display: block;">Permisos Especiales (Centro Analítico)</label>
                    <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                        <label id="perm-extraccion-container" style="display: flex; align-items: center; gap: 0.6rem; font-size: 0.875rem; color: var(--text-secondary); cursor: pointer; user-select: none;">
                            <input type="checkbox" id="perm_extraccion" name="permiso_extraccion" style="width: 16px; height: 16px; accent-color: var(--accent-color); cursor: pointer;">
                            Extracción de Datos
                        </label>
                        <label id="perm-alarmas-container" style="display: flex; align-items: center; gap: 0.6rem; font-size: 0.875rem; color: var(--text-secondary); cursor: pointer; user-select: none;">
                            <input type="checkbox" id="perm_alarmas" name="permiso_alarmas" style="width: 16px; height: 16px; accent-color: var(--accent-color); cursor: pointer;">
                            Gestión de Alarmas
                        </label>
                        <label id="perm-visor-container" style="display: flex; align-items: center; gap: 0.6rem; font-size: 0.875rem; color: var(--text-secondary); cursor: pointer; user-select: none;">
                            <input type="checkbox" id="perm_visor" name="permiso_visor" style="width: 16px; height: 16px; accent-color: var(--accent-color); cursor: pointer;">
                            Visor de Archivos
                        </label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel modal-close">Cancelar</button>
                    <button type="submit" class="btn-save">Crear Usuario</button>
                </div>
            </form>
        </div>
    </div>

    <div id="station-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 class="modal-title">Nueva Estación</h2>
            <form id="station-form">
                <div class="form-group">
                    <label for="st-nombre">Nombre Estación</label>
                    <input type="text" id="st-nombre" name="nombre" required>
                </div>
                <div class="form-group">
                    <label for="st-ip">Dirección IP / Host</label>
                    <input type="text" id="st-ip" name="ip" placeholder="10.0.0.X" required>
                </div>
                <div class="form-group">
                    <label for="st-provincia">Provincia</label>
                    <select id="st-provincia" name="provincia">
                        <option value="">Global</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <label style="color: var(--accent-color); font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.75rem; letter-spacing: 0.05em; text-transform: uppercase;" onclick="const fields = document.getElementById('analitico-fields'); fields.style.display = fields.style.display === 'none' ? 'block' : 'none';">
                        <span>⚙️ Opciones Centro Analítico</span>
                        <span>▼</span>
                    </label>
                    <div id="analitico-fields" style="display: none; margin-top: 1rem;">
                        <div class="form-group">
                            <label for="st-ruta-bin">Ruta Compartida Binarios (UNC)</label>
                            <input type="text" id="st-ruta-bin" name="ruta_bin" placeholder="\\\\servidor\\ruta_bin">
                        </div>
                        <div class="form-group">
                            <label for="st-ruta-res">Ruta Compartida Resultados (UNC)</label>
                            <input type="text" id="st-ruta-res" name="ruta_res" placeholder="\\\\servidor\\ruta_res">
                        </div>
                        <div class="form-group">
                            <label for="st-usr-red">Usuario de Red (Opcional)</label>
                            <input type="text" id="st-usr-red" name="usr_red" placeholder="DSIC\\usuario">
                        </div>
                        <div class="form-group">
                            <label for="st-pwd-red">Contraseña de Red (Opcional)</label>
                            <input type="password" id="st-pwd-red" name="pwd_red" placeholder="••••••••">
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel modal-close">Cancelar</button>
                    <button type="submit" class="btn-save">Registrar Estación</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js?v=2.0.1"></script>
</body>

</html>
