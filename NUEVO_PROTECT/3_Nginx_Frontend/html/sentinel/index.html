<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Radar - Tactical Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <!-- ECharts & ECharts GL (local - sin internet) -->
    <script src="/assets/js/echarts.min.js"></script>
    <script src="/assets/js/echarts-gl.min.js"></script>
</head>

<body>
    <!-- Alertas y Errores (Overlays) -->
    <div class="hud-alert" id="hudAlert">¡ALERTA TÁCTICA: UMBRAL SUPERADO!</div>

    <div class="hwid-error" id="hwidError">
        <div class="glitch-text">HWID AUTH ERROR</div>
        <div class="sub-text">CRYPTOGRAPHIC SIGNATURE MISMATCH DETECTED</div>
    </div>

    <!-- Contenedor Principal Búnker -->
    <div class="bunker-container">

        <!-- Panel Lateral (Sidebar) -->
        <aside class="side-panel" id="sidePanel">
            <div class="panel-header">
                <h2>SENTINEL RADAR</h2>
                <div class="status-indicator" style="margin-bottom: 12px;">
                    <span class="dot blink" id="statusDot"></span>
                    <span id="statusText">STANDBY</span>
                </div>
                <button id="backToPortalBtn" class="cyber-btn" style="margin-top: 10px; background: rgba(0, 243, 255, 0.05); color: var(--cyan); border-color: rgba(0, 243, 255, 0.2); font-size: 11px; padding: 6px; text-align: center; text-transform: uppercase; width: 100%;">← Volver al Portal</button>
            </div>

            <div class="panel-section">
                <h3>ESTACION</h3>
                <select id="sourceSelect" class="cyber-select" disabled>
                    <option value="">⏳ Conectando con el servidor...</option>
                </select>
                <button id="startBtn" class="cyber-btn" disabled>INICIAR BARRIDO</button>
                <button id="stopBtn" class="cyber-btn stop-btn" disabled style="margin-top: 10px;">DETENER BARRIDO</button>
            </div>

            <div class="panel-section stats">
                <div class="stat-box">
                    <span class="stat-label">ANTENNA MAC/ID</span>
                    <span class="stat-value text-neon" id="macId">AWAITING SYNC...</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">RANGO DE FRECUENCIA</span>
                    <span class="stat-value text-cyan" id="centerFreq">--- MHz</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">ALERTA PICO</span>
                    <input type="range" id="thresholdSlider" min="-120" max="-20" value="-60">
                    <span class="stat-value" id="thresholdValue">-60 dBµV</span>
                </div>
            </div>

            <div class="panel-footer">
                <div class="scan-line"></div>
                <span>CLAVE ACTIVADA</span>
            </div>
        </aside>

        <!-- Botón de colapso -->
        <div class="toggle-btn" id="toggleBtn">❮</div>

        <!-- Vista Principal (3D Waterfall) -->
        <main class="main-viewport">
            <div id="waterfallContainer"></div>
        </main>

    </div>

    <script src="app.js"></script>
</body>

</html>
