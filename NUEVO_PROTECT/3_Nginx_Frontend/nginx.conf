# Nginx Configuration for Windows - Testing Mode (HTTP)
# Optimized for Phoenix Sentinel Appliance

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Backend Go (SSO Portal)
    upstream auth_backend {
        server 127.0.0.1:8080;
    }

    # Backend C++ (Sentinel Core)
    upstream sentinel_backend {
        server 127.0.0.1:8081;
    }

    server {
        listen       80;
        server_name  localhost;

        # --- Redirección raíz ---
        # Si entran a localhost a secas, los mandamos al portal
        location = / {
            return 301 /sso/;
        }

        # --- SSO Portal Frontend ---
        location /sso/ {
            alias "C:/nginx/html/sso/";
            index index.html;
            try_files $uri $uri/ /sso/index.html;
        }

        # --- Panel de Administración Oculto ---
        location = /sso/admin.html {
            auth_request /verify;
            error_page 401 = @error401;
            error_page 403 = @error403;

            alias "C:/nginx/html/sso/admin.html";
        }

        # --- Centro Analítico Frontend ---
        location /analitico/ {
            auth_request /verify;
            error_page 401 = @error401;
            error_page 403 = @error403;

            proxy_pass http://127.0.0.1:8082/;
            proxy_set_header Cookie $http_cookie;
        }

        # --- Centro Analítico APIs (Proxy to port 8082) ---
        location /api/fuentes {
            auth_request /verify;
            proxy_pass http://127.0.0.1:8082;
            proxy_set_header Cookie $http_cookie;
        }

        location /api/extraer {
            auth_request /verify;
            proxy_pass http://127.0.0.1:8082;
            proxy_set_header Cookie $http_cookie;
            client_max_body_size 100M;
        }

        location /api/files/ {
            auth_request /verify;
            proxy_pass http://127.0.0.1:8082;
            proxy_set_header Cookie $http_cookie;
        }

        location /api/config {
            auth_request /verify;
            proxy_pass http://127.0.0.1:8082;
            proxy_set_header Cookie $http_cookie;
        }

        location /api/progreso {
            auth_request /verify;
            proxy_pass http://127.0.0.1:8082;
            proxy_set_header Cookie $http_cookie;
        }

        # --- API SSO (Login general) ---
        location /api/ {
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        # --- API de Administración (Protegida) ---
        location /api/admin/ {
            auth_request /verify;
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Internal Verification (El Guardia de Seguridad) ---
        location = /verify {
            internal;
            proxy_pass http://auth_backend/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # --- Gestión de Procesos (WinRM) ---
        location /procesos/ {
            auth_request /verify;
            error_page 401 = @error401;
            error_page 403 = @error403;

            alias "C:/nginx/html/procesos/";
            index winremote-manager.html;
        }

        # --- Sentinel Application (Frontend protegido) ---
        location /sentinel {
            auth_request /verify;
            error_page 401 = @error404;
            error_page 403 = @error404;

            alias  "C:/nginx/html/sentinel/";
            index  index.html;
        }
location /ws/ {
    proxy_pass http://127.0.0.1:8080/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    
    # Opcional: Aumentar timeouts si el radar es de varios Gigabytes
    proxy_read_timeout 86400;
}

        # --- Sentinel WebSocket (Conexión C++ protegida) ---
        location /sentinel/ws {
            auth_request /verify;
            
            proxy_pass http://sentinel_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # --- Error Handling ---
        location @error401 {
            return 302 /sso/; # Si no hay token, de vuelta al login
        }

        # --- Static Assets for Errors ---
        location = /forbidden.html {
            root "C:/nginx/html";
        }

        location = /Dragonite_noautoriza.gif {
            root "C:/nginx/html";
        }

        location @error403 {
            root "C:/nginx/html";
            try_files /forbidden.html =403;
        }

        location @error404 {
            return 404; # Retorno sigiloso 404 (oculta el panel si no hay login)
        }
    }
}
